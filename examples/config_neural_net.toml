[data]
input_path = "examples/synthetic_lookup.csv"
predict_path = "examples/predict_inputs.csv"
input_columns = ["Q2_log_center","W2_center","t_center"]
target_column = "logA"
train_fraction = 0.8
random_seed = 42

[transforms]
q2_transform = "log_zscore"
w2_transform = "log_zscore"
t_transform = "log_stabilized"
t_epsilon_frac = 0.01
target_scaler = "robust"

[models]
enabled = ["neural_net"]

[models.neural_net]
hidden_layers = [128,128,64]
activation = "tanh"
use_resnet = true
lr = 1e-3
weight_decay = 1e-6
max_epochs = 200
batch_size = 64
early_stopping_patience = 20

[evaluation]
metrics = ["rmse"]
output_dir = "results/"
save_plots = true

[persistence]
model_dir = "saved_models/"
save_scalers = true

[logging]
level = "INFO"
log_file = ""
