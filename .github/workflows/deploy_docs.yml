name: Build and deploy MkDocs site

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'examples/**'
      - '.github/workflows/deploy_docs.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install MkDocs and theme
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.5" "mkdocs-material>=9.0"
          # Install mkdocs plugins if used by site (add as-needed)
          # e.g. pip install mkdocstrings mkdocs-redirects

      - name: Build site
        run: mkdocs build --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: false
